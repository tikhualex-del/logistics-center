<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistics Center — Orders Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: sans-serif; }

    /* ── Layout ── */
    #layout     { display: flex; flex-direction: column; width: 100%; height: 100%; }
    #map-wrap   { display: flex; flex: 1; overflow: hidden; }
    #map        { flex: 1; height: 100%; }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #ddd;
    }
    #tabs button {
      padding: 10px 24px;
      font-size: 14px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      color: #666;
    }
    #tabs button.active {
      color: #2980b9;
      border-bottom-color: #2980b9;
      font-weight: 600;
    }

    /* ── Tab views ── */
    .tab-view          { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-view.visible  { display: flex; }

    #courier-monitor { overflow: hidden; }
    #courier-map     { width: 100%; height: 100%; }

    /* ── Filters ── */
    #filters {
      display: flex;
      gap: 12px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      align-items: center;
    }
    #filters select {
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 320px;
      height: 100%;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    #sidebar-content {
      padding: 20px;
      flex: 1;
    }

    .sidebar-placeholder {
      color: #999;
      font-size: 14px;
      margin-top: 40px;
      text-align: center;
    }

    .sidebar-loading { color: #666; font-size: 14px; padding: 8px 0; }
    .sidebar-error   { color: #c0392b; font-size: 14px; padding: 8px 0; }

    /* ── Order card ── */
    .order-card h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #222;
      word-break: break-all;
    }

    .order-field { margin-bottom: 12px; }
    .order-field .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 2px;
    }
    .order-field .value {
      font-size: 14px;
      color: #222;
      word-break: break-word;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      background: #e8f4fd;
      color: #2980b9;
    }
  </style>
</head>
<body>

  <div id="layout">
    <div id="tabs">
      <button class="active" onclick="switchTab('orders')">Карта</button>
      <button onclick="switchTab('couriers')">Мониторинг курьеров</button>
    </div>

    <div id="orders-view" class="tab-view visible">
      <div id="filters">
        <select id="statusFilter">
          <option value="">Все статусы</option>
          <option value="new">new</option>
          <option value="in_progress">in_progress</option>
          <option value="done">done</option>
        </select>
        <select id="assignmentFilter">
          <option value="">Все</option>
          <option value="assigned">Назначенные</option>
          <option value="unassigned">Без курьера</option>
        </select>
      </div>
      <div id="map-wrap">
        <div id="map"></div>
        <div id="sidebar">
          <div id="sidebar-content">
            <p class="sidebar-placeholder">Выберите заказ на карте</p>
          </div>
        </div>
      </div>
    </div>

    <div id="courier-monitor" class="tab-view">
      <div id="courier-map"></div>
    </div>
  </div>

  <script src="https://api-maps.yandex.ru/2.1/?apikey=b01c2599-45c6-4e3c-83b1-1895e97e199e&lang=ru_RU"></script>
  <script>
    const API_BASE = 'http://localhost:3000';

    // ── Sidebar state ──────────────────────────────────────────────────────────
    let selectedOrderId = null;
    let selectedOrder   = null;
    let detailsLoading  = false;
    let detailsError    = false;
    let couriers        = [];
    let reloadOrders    = null;

    const sidebarContent = document.getElementById('sidebar-content');

    async function loadCouriers() {
      try {
        const res  = await fetch(`${API_BASE}/couriers`, { headers: tenantHeaders });
        const json = await res.json();
        if (json.success) {
          couriers = json.data;
          console.log('Couriers:', json.data);
        }
      } catch {
        couriers = [];
      }
    }

    async function loadOrderDetails(orderId) {
      selectedOrderId = orderId;
      selectedOrder   = null;
      detailsLoading  = true;
      detailsError    = false;
      renderSidebar();

      try {
        const res  = await fetch(`${API_BASE}/orders/${orderId}`, { headers: tenantHeaders });
        const json = await res.json();

        if (json.success) {
          selectedOrder  = json.data;
          detailsError   = false;
          await loadCouriers();
        } else {
          detailsError = true;
        }
      } catch {
        detailsError = true;
      } finally {
        detailsLoading = false;
        renderSidebar();
      }
    }

    function renderSidebar() {
      if (detailsLoading) {
        sidebarContent.innerHTML = '<p class="sidebar-loading">Загрузка...</p>';
        return;
      }

      if (detailsError) {
        sidebarContent.innerHTML = '<p class="sidebar-error">Не удалось загрузить заказ</p>';
        return;
      }

      if (!selectedOrder) {
        sidebarContent.innerHTML = '<p class="sidebar-placeholder">Выберите заказ на карте</p>';
        return;
      }

      const o = selectedOrder;

      sidebarContent.innerHTML = `
        <div class="order-card">
          <h2>Заказ</h2>

          <div class="order-field">
            <div class="label">ID</div>
            <div class="value">${o.id}</div>
          </div>

          <div class="order-field">
            <div class="label">Статус</div>
            <div class="value"><span class="status-badge">${o.status}</span></div>
          </div>

          <div class="order-field">
            <div class="label">Адрес</div>
            <div class="value">${o.address}</div>
          </div>

          ${o.deliveryDate ? `
          <div class="order-field">
            <div class="label">Дата доставки</div>
            <div class="value">${o.deliveryDate}</div>
          </div>` : ''}

          <div class="order-field">
            <div class="label">Компания</div>
            <div class="value">${o.companyId}</div>
          </div>

          ${o.lat != null && o.lng != null ? `
          <div class="order-field">
            <div class="label">Координаты</div>
            <div class="value">${o.lat.toFixed(5)}, ${o.lng.toFixed(5)}</div>
          </div>` : ''}

          ${o.comment ? `
          <div class="order-field">
            <div class="label">Комментарий</div>
            <div class="value">${o.comment}</div>
          </div>` : ''}

          <div class="order-field">
            <div class="label">Создан</div>
            <div class="value">${new Date(o.createdAt).toLocaleString('ru-RU')}</div>
          </div>

          ${o.courierId ? (() => {
            const assigned = couriers.find(c => c.id === o.courierId);
            const name = assigned ? `${assigned.firstName} ${assigned.lastName}` : o.courierId;
            return `
          <div class="order-field" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div class="label">Назначен</div>
              <div class="value">${name}</div>
            </div>
            <button onclick="unassignCourier()" style="font-size:12px;cursor:pointer;padding:3px 10px;color:#c0392b;">Снять курьера</button>
          </div>`;
          })() : ''}
        </div>

        <div class="order-card" style="margin-top: 24px;">
          <h2>Курьеры</h2>
          ${couriers.length === 0
            ? '<p class="sidebar-placeholder" style="margin-top: 8px;">Нет курьеров</p>'
            : couriers.map(c => `
          <div class="order-field" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div class="value">${c.firstName} ${c.lastName}</div>
              <div class="label">${c.status}, ${c.transportType}</div>
            </div>
            ${o.courierId === c.id
              ? '<span class="status-badge" style="background:#e8f8f0;color:#27ae60;">Назначен</span>'
              : `<button onclick="assignCourier('${c.id}')" style="font-size:12px;cursor:pointer;padding:3px 10px;">Назначить</button>`
            }
          </div>`).join('')
          }
        </div>
      `;
    }

    async function assignCourier(courierId) {
      try {
        const res  = await fetch(`${API_BASE}/orders/${selectedOrderId}/assign`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', ...tenantHeaders },
          body: JSON.stringify({ courierId }),
        });
        const json = await res.json();
        if (json.success) {
          console.log('Assigned:', json);
          selectedOrder.courierId = courierId;
          renderSidebar();
          if (reloadOrders) reloadOrders();
        } else {
          console.error('Assign failed:', json);
        }
      } catch (err) {
        console.error('Assign error:', err);
      }
    }

    async function unassignCourier() {
      try {
        const res  = await fetch(`${API_BASE}/orders/${selectedOrderId}/unassign`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', ...tenantHeaders },
          body: JSON.stringify({}),
        });
        const json = await res.json();
        if (json.success) {
          console.log('Unassigned');
          selectedOrder.courierId = null;
          renderSidebar();
          if (reloadOrders) reloadOrders();
        } else {
          console.error('Unassign failed:', json);
        }
      } catch (err) {
        console.error('Unassign error:', err);
      }
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────

    const COMPANY_ID     = '91a83ade-5ac6-47df-8480-f4a652972d79';
    const tenantHeaders  = { 'x-company-id': COMPANY_ID };

    function switchTab(tab) {
      document.getElementById('orders-view').classList.toggle('visible', tab === 'orders');
      document.getElementById('courier-monitor').classList.toggle('visible', tab === 'couriers');

      document.querySelectorAll('#tabs button').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'orders') || (i === 1 && tab === 'couriers'));
      });

      if (tab === 'couriers') loadCouriersForMap(COMPANY_ID);
    }

    // ── Courier Map ───────────────────────────────────────────────────────────

    let courierMap = null;

    async function loadCouriersForMap(companyId) {
      const url = `${API_BASE}/couriers/map`;
      console.log('Fetching couriers for map:', url);

      try {
        const res  = await fetch(url, { headers: tenantHeaders });
        const json = await res.json();
        console.log('Couriers map response:', json);
        if (json.success) renderCouriersOnMap(json.data);
      } catch (err) {
        console.error('Failed to load couriers for map:', err);
      }
    }

    function renderCouriersOnMap(couriersData) {
      if (!courierMap) {
        courierMap = new ymaps.Map('courier-map', {
          center: [55.751244, 37.618423],
          zoom: 11,
          controls: ['zoomControl', 'fullscreenControl'],
        });
      }

      courierMap.geoObjects.removeAll();

      for (const c of couriersData) {
        const placemark = new ymaps.Placemark(
          [c.lat, c.lng],
          {
            hintContent: `${c.firstName} ${c.lastName}`,
            balloonContent: `${c.firstName} ${c.lastName}<br>${c.status} · ${c.transportType}`,
          },
          {
            preset: 'islands#orangePersonCircleIcon',
          }
        );
        courierMap.geoObjects.add(placemark);
      }
    }

    // ── Map ────────────────────────────────────────────────────────────────────

    function getGridSize(zoom) {
      if (zoom >= 14) return 0.005;
      if (zoom >= 11) return 0.01;
      return 0.05;
    }

    ymaps.ready(function () {

      const map = new ymaps.Map('map', {
        center: [55.751244, 37.618423],
        zoom: 11,
        controls: ['zoomControl', 'fullscreenControl'],
      });

      // ── Fetch ────────────────────────────────────────────────────────────────

      let debounceTimer    = null;
      let activeController = null;

      function scheduledLoad() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(loadOrders, 300);
      }

      async function loadOrders() {
        if (activeController) activeController.abort();
        activeController = new AbortController();

        const [[minLat, minLng], [maxLat, maxLng]] = map.getBounds();
        const gridSize = getGridSize(map.getZoom());

        const statusValue     = document.getElementById('statusFilter').value;
        const assignmentValue = document.getElementById('assignmentFilter').value;

        console.log('Filters:', { status: statusValue, assignment: assignmentValue });

        const url = new URL(`${API_BASE}/orders/map/cluster`);
        url.searchParams.set('minLat', minLat);
        url.searchParams.set('maxLat', maxLat);
        url.searchParams.set('minLng', minLng);
        url.searchParams.set('maxLng', maxLng);
        url.searchParams.set('gridSize', gridSize);
        if (statusValue) url.searchParams.set('status', statusValue);

        try {
          console.log('Fetching cluster:', url.toString());
          const res  = await fetch(url.toString(), { signal: activeController.signal, headers: tenantHeaders });
          const json = await res.json();
          console.log('Cluster response:', json);
          if (json.success) {
            let data = json.data;
            if (assignmentValue === 'assigned')   data = data.filter(i => i.type !== 'point' || i.courierId !== null);
            if (assignmentValue === 'unassigned') data = data.filter(i => i.type !== 'point' || i.courierId === null);
            renderItems(data);
          }
        } catch (err) {
          if (err.name === 'AbortError') return;
          console.error('Failed to load orders:', err);
        }
      }

      // ── Render ───────────────────────────────────────────────────────────────

      function renderItems(items) {
        map.geoObjects.removeAll();
        for (const item of items) {
          if (item.type === 'point') renderPoint(item);
          else renderCluster(item);
        }
      }

      // Single order — opens sidebar on click
      function renderPoint(point) {
        const preset = point.courierId
          ? 'islands#greenDeliveryCircleIcon'
          : 'islands#blueDeliveryCircleIcon';

        const placemark = new ymaps.Placemark(
          [point.lat, point.lng],
          {
            hintContent: `Заказ · ${point.status}`,
          },
          {
            preset,
            cursor: 'pointer',
          }
        );

        placemark.events.add('click', () => {
          loadOrderDetails(point.id);
        });

        map.geoObjects.add(placemark);
      }

      // Multiple orders — zoom in on click
      function renderCluster(cluster) {
        const placemark = new ymaps.Placemark(
          [cluster.lat, cluster.lng],
          {
            iconContent: cluster.count,
            hintContent: `${cluster.count} заказов — кликните для приближения`,
          },
          {
            preset: 'islands#blueStretchyIcon',
            cursor: 'pointer',
          }
        );

        placemark.events.add('click', () => {
          const nextZoom = Math.min(map.getZoom() + 2, 17);
          map.setCenter([cluster.lat, cluster.lng], nextZoom, { duration: 300 });
        });

        map.geoObjects.add(placemark);
      }

      reloadOrders = loadOrders;

      // ── Events ───────────────────────────────────────────────────────────────

      document.getElementById('statusFilter').addEventListener('change', loadOrders);
      document.getElementById('assignmentFilter').addEventListener('change', loadOrders);

      map.events.add('boundschange', scheduledLoad);
      loadOrders();
    });
  </script>

</body>
</html>
